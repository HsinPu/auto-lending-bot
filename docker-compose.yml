services:
  auto-lending-bot:
    build: .
    environment:
      BOT_DRY_RUN: "true"
      EXCHANGE: mock
      DATABASE_URL: sqlite:////app/data/auto_lending_bot.db
      REPORT_PATH: /app/reports/dashboard.html
      BOT_MAX_LOOPS: "1"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
